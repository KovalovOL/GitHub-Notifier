<!DOCTYPE html>
<html lang="en">
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: sans-serif;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="margin-top: 40px;">
        <tr>
            <td align="center">
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="padding: 20px;">
                    <tr>
                        <td>
                            <h1 style="font-size: 24px; color: #111;">Repository Updated</h1>
                            <p style="color: #444;">Hello! A new version has been published to repository:</p>
                            <p style="color: #111; font-weight: bold; margin-bottom: 5px;">Repository:</p>
                            <p style="color: #444; margin-top: 0;">{{ .RepoName }}</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding: 20px; background-color: #f8f9fa; border-radius: 4px;">
                            <span style="font-size: 20px; color: #111; font-family: monospace;">New Tag: </span>
                            <span style="font-size: 24px; font-weight: bold; color: #007bff; font-family: monospace;">{{ .NewTag }}</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding-top: 20px;">
                            <p style="color: #888; font-size: 13px;">
                                This is an automated notification.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
